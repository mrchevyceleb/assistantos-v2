name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            target: "aarch64-apple-darwin,x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AssistantOS ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload updater artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $nsisZip = Get-ChildItem -Path src-tauri/target -Recurse -Filter "*.nsis.zip" | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path src-tauri/target -Recurse -Filter "*.nsis.zip.sig" | Select-Object -First 1

          if ($nsisZip -and $nsisSig) {
            Write-Host "Uploading $($nsisZip.FullName)"
            gh release upload $tag $nsisZip.FullName --clobber
            Write-Host "Uploading $($nsisSig.FullName)"
            gh release upload $tag $nsisSig.FullName --clobber
          } else {
            Write-Host "WARNING: NSIS zip or sig not found"
            Get-ChildItem -Path src-tauri/target -Recurse -Include "*.sig","*.nsis.zip" | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Upload updater artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          APP_SIG=$(find src-tauri/target -name "*.app.tar.gz.sig" | head -1)

          if [ -n "$APP_SIG" ]; then
            echo "Uploading $APP_SIG"
            gh release upload "$TAG" "$APP_SIG" --clobber
          else
            echo "WARNING: app.tar.gz.sig not found"
            find src-tauri/target -name "*.sig" 2>/dev/null
          fi

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create updater JSON and publish
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            // Find draft release (getReleaseByTag doesn't find drafts)
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              core.setFailed(`Release with tag ${tag} not found`);
              return;
            }

            const assets = release.assets;
            const baseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}`;

            let windowsSig = '';
            let macSig = '';

            for (const asset of assets) {
              if (asset.name.endsWith('.nsis.zip.sig')) {
                const resp = await github.request('GET ' + asset.url, {
                  headers: { Accept: 'application/octet-stream' }
                });
                windowsSig = new TextDecoder().decode(resp.data).trim();
                core.info(`Found Windows sig: ${asset.name} (${windowsSig.length} chars)`);
              }
              if (asset.name.endsWith('.app.tar.gz.sig')) {
                const resp = await github.request('GET ' + asset.url, {
                  headers: { Accept: 'application/octet-stream' }
                });
                macSig = new TextDecoder().decode(resp.data).trim();
                core.info(`Found macOS sig: ${asset.name} (${macSig.length} chars)`);
              }
            }

            const nsisZip = assets.find(a => a.name.endsWith('.nsis.zip'));
            const appTarGz = assets.find(a => a.name.endsWith('.app.tar.gz'));

            const version = tag.replace(/^v/, '');
            const now = new Date().toISOString();

            const platforms = {};

            if (nsisZip && windowsSig) {
              platforms['windows-x86_64'] = {
                signature: windowsSig,
                url: `${baseUrl}/${nsisZip.name}`
              };
            } else {
              core.warning('Windows updater artifacts missing');
            }

            if (appTarGz && macSig) {
              const macEntry = {
                signature: macSig,
                url: `${baseUrl}/${appTarGz.name}`
              };
              platforms['darwin-universal'] = macEntry;
              platforms['darwin-aarch64'] = macEntry;
              platforms['darwin-x86_64'] = macEntry;
            } else {
              core.warning('macOS updater artifacts missing');
            }

            const latestJson = JSON.stringify({
              version,
              notes: `AssistantOS ${tag}`,
              pub_date: now,
              platforms
            }, null, 2);

            core.info('latest.json:');
            core.info(latestJson);

            // Upload latest.json
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: latestJson
            });
            core.info('Uploaded latest.json');

            // Publish
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false
            });
            core.info('Release published!');
