name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: List build artifacts
        shell: pwsh
        run: |
          Write-Host "=== NSIS bundle ==="
          Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Recurse | ForEach-Object { Write-Host $_.FullName }
          Write-Host "=== MSI bundle ==="
          Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target universal-apple-darwin

      - name: List build artifacts
        run: |
          echo "=== macOS bundle ==="
          find src-tauri/target/universal-apple-darwin/release/bundle -type f 2>/dev/null || true
          find src-tauri/target/release/bundle -type f 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create release and upload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            // Create release
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `AssistantOS ${tag}`,
              draft: false,
              prerelease: false
            });
            core.info(`Created release: ${release.html_url}`);

            // Collect all files from artifacts directories
            function findFiles(dir) {
              const results = [];
              if (!fs.existsSync(dir)) return results;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  results.push(...findFiles(full));
                } else {
                  results.push(full);
                }
              }
              return results;
            }

            const files = findFiles('artifacts');
            core.info(`Found ${files.length} files to upload`);

            // Upload each file
            for (const filePath of files) {
              const name = path.basename(filePath);
              const data = fs.readFileSync(filePath);
              core.info(`Uploading ${name} (${data.length} bytes)`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: name,
                data: data
              });
            }

            // Build latest.json for updater
            const baseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}`;
            const platforms = {};

            // Find sig files
            const winSigFile = files.find(f => f.endsWith('.nsis.zip.sig'));
            const macSigFile = files.find(f => f.endsWith('.app.tar.gz.sig'));
            const nsisZipFile = files.find(f => f.endsWith('.nsis.zip') && !f.endsWith('.sig'));
            const appTarGzFile = files.find(f => f.endsWith('.app.tar.gz') && !f.endsWith('.sig'));

            if (nsisZipFile && winSigFile) {
              const sig = fs.readFileSync(winSigFile, 'utf8').trim();
              const name = path.basename(nsisZipFile);
              platforms['windows-x86_64'] = {
                signature: sig,
                url: `${baseUrl}/${name}`
              };
              core.info(`Windows updater: ${name} (sig ${sig.length} chars)`);
            } else {
              core.warning('Windows updater artifacts missing');
            }

            if (appTarGzFile && macSigFile) {
              const sig = fs.readFileSync(macSigFile, 'utf8').trim();
              const name = path.basename(appTarGzFile);
              const entry = {
                signature: sig,
                url: `${baseUrl}/${name}`
              };
              platforms['darwin-universal'] = entry;
              platforms['darwin-aarch64'] = entry;
              platforms['darwin-x86_64'] = entry;
              core.info(`macOS updater: ${name} (sig ${sig.length} chars)`);
            } else {
              core.warning('macOS updater artifacts missing');
            }

            const latestJson = JSON.stringify({
              version,
              notes: `AssistantOS ${tag}`,
              pub_date: new Date().toISOString(),
              platforms
            }, null, 2);

            core.info('latest.json:');
            core.info(latestJson);

            // Upload latest.json
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: latestJson
            });
            core.info('Release published with updater manifest!');

      - name: Mirror updater feed to public repo
        env:
          GH_TOKEN: ${{ secrets.UPDATER_FEED_TOKEN }}
          FEED_REPO: mrchevyceleb/assistantos-v2-updates
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "UPDATER_FEED_TOKEN is not set, skipped mirroring public updater feed"
            exit 0
          fi

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          mkdir -p updater-feed

          win_zip="$(find artifacts/windows -type f -name '*.nsis.zip' | head -n 1 || true)"
          win_sig="$(find artifacts/windows -type f -name '*.nsis.zip.sig' | head -n 1 || true)"
          mac_tar="$(find artifacts/macos -type f -name '*.app.tar.gz' | head -n 1 || true)"
          mac_sig="$(find artifacts/macos -type f -name '*.app.tar.gz.sig' | head -n 1 || true)"

          if [ -z "$win_zip" ] || [ -z "$win_sig" ] || [ -z "$mac_tar" ] || [ -z "$mac_sig" ]; then
            echo "Missing updater artifacts in downloaded action artifacts"
            find artifacts -type f | sort
            exit 1
          fi

          cp "$win_zip" updater-feed/
          cp "$win_sig" updater-feed/
          cp "$mac_tar" updater-feed/
          cp "$mac_sig" updater-feed/

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const tag = process.env.GITHUB_REF_NAME;
          const version = tag.replace(/^v/, '');
          const feedRepo = process.env.FEED_REPO;
          const baseUrl = `https://github.com/${feedRepo}/releases/download/${tag}`;

          const files = fs.readdirSync('updater-feed');
          const winSigName = files.find((f) => f.endsWith('.nsis.zip.sig'));
          const winZipName = files.find((f) => f.endsWith('.nsis.zip') && !f.endsWith('.sig'));
          const macSigName = files.find((f) => f.endsWith('.app.tar.gz.sig'));
          const macTarName = files.find((f) => f.endsWith('.app.tar.gz') && !f.endsWith('.sig'));

          if (!winSigName || !winZipName || !macSigName || !macTarName) {
            throw new Error('Missing updater feed artifacts while mirroring release');
          }

          const winSig = fs.readFileSync(path.join('updater-feed', winSigName), 'utf8').trim();
          const macSig = fs.readFileSync(path.join('updater-feed', macSigName), 'utf8').trim();

          const macEntry = {
            signature: macSig,
            url: `${baseUrl}/${macTarName}`,
          };

          const latest = {
            version,
            notes: `AssistantOS ${tag}`,
            pub_date: new Date().toISOString(),
            platforms: {
              'windows-x86_64': {
                signature: winSig,
                url: `${baseUrl}/${winZipName}`,
              },
              'darwin-universal': macEntry,
              'darwin-aarch64': macEntry,
              'darwin-x86_64': macEntry,
            },
          };

          fs.writeFileSync('updater-feed/latest.json', JSON.stringify(latest, null, 2));
          EOF

          if gh release view "$tag" -R "$FEED_REPO" > /dev/null 2>&1; then
            gh release upload "$tag" -R "$FEED_REPO" updater-feed/* --clobber
          else
            gh release create "$tag" -R "$FEED_REPO" \
              --title "AssistantOS ${tag}" \
              --notes "Public updater feed assets for AssistantOS ${tag}." \
              updater-feed/*
          fi
